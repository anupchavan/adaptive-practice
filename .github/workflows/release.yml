name: Release Obsidian plugin
on:
    push:
        tags:
            - "*"
jobs:
    build:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            id-token: write
            attestations: write
        steps:
            - uses: actions/checkout@v3
            - name: Use Node.js
              uses: actions/setup-node@v3
              with:
                  node-version: "20.x"
            - name: Build plugin
              run: |
                  npm install
                  npm run build
            # Attestation persistence is only available on public repos (or
            # Enterprise); on a private repo the step hard-fails the release,
            # so gate it on visibility. Private-repo provenance is verified by
            # rebuilding from the tag and checksum-comparing the assets.
            - name: Generate artifact attestation
              if: ${{ !github.event.repository.private }}
              uses: actions/attest-build-provenance@v2
              with:
                  subject-path: |
                      main.js
                      styles.css
                      manifest.json
            - name: Create release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  tag="${GITHUB_REF#refs/tags/}"
                  notes="release-notes/${tag}.md"
                  notes_args=()
                  if [ -f "$notes" ]; then
                    notes_args=(--notes-file "$notes")
                  fi
                  gh release create "$tag" \
                    --title="$tag" \
                    --draft \
                    "${notes_args[@]}" \
                    main.js manifest.json styles.css
